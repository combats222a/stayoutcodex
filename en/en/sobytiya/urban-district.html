<meta charset="UTF-8">

<style>
  :root {
    --bg:        #0d0f0a;
    --surface:   #141710;
    --border:    #2a2f1e;
    --green:     #7aaa2e;
    --green-dim: #4a6a1a;
    --amber:     #c8920a;
    --text:      #c9cdbf;
    --text-dim:  #6b7060;
    --code:      #7aaa2e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'PT Sans', sans-serif; font-size: 1rem; line-height: 1.6; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px); pointer-events: none; z-index: 9999; }

  #site-nav { position: sticky; top: 0; z-index: 100; }
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1rem; }
  .nav-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 52px; gap: 1rem; }
  .nav-logo { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--green); letter-spacing: .08em; text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; flex-shrink: 1; }
  .nav-logo span { color: var(--text-dim); font-weight: 400; }
  @media (max-width: 600px) { .nav-logo span { display: none; } }
  .nav-links { display: flex; gap: .25rem; flex-shrink: 0; align-items: center; }
  .nav-links a { color: var(--text-dim); text-decoration: none; font-size: .8rem; letter-spacing: .05em; padding: .3rem .55rem; border: 1px solid transparent; border-radius: 2px; transition: all .15s; white-space: nowrap; }
  .nav-links a:hover { color: var(--green); border-color: var(--green-dim); }
  .nav-links a.active { color: var(--green); border-color: var(--green-dim); background: rgba(122,170,46,.06); }
  .nav-lang { display: flex; align-items: center; gap: 0; flex-shrink: 0; font-family: 'Share Tech Mono', monospace; font-size: 1rem; letter-spacing: .08em; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .nav-lang a { color: var(--text-dim); text-decoration: none; padding: .35rem .6rem; transition: all .15s; line-height: 1; }
  .nav-lang a:hover { color: var(--green); background: rgba(122,170,46,.06); }
  .nav-lang a.lang-active { color: var(--green); background: rgba(122,170,46,.1); cursor: default; pointer-events: none; }
  .nav-lang span { color: var(--border); padding: 0 1px; user-select: none; }
  .nav-steam { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border: 1px solid transparent; border-radius: 2px; color: var(--text-dim); text-decoration: none; transition: all .15s; flex-shrink: 0; }
  .nav-steam:hover { color: var(--green); border-color: var(--green-dim); background: rgba(122,170,46,.06); }
  .nav-steam svg { width: 24px; height: 24px; }
  .nav-burger { display: none; flex-shrink: 0; background: none; border: 1px solid var(--border); border-radius: 3px; padding: .35rem .45rem; cursor: pointer; flex-direction: column; gap: 4px; align-items: center; justify-content: center; }
  .nav-burger span { display: block; width: 18px; height: 2px; background: var(--text-dim); border-radius: 1px; transition: background .15s; }
  .nav-burger:hover span { background: var(--green); }
  .nav-dropdown { display: none; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: .5rem 1rem; }
  .nav-dropdown.open { display: block; }
  .nav-dropdown a { display: block; color: var(--text-dim); text-decoration: none; font-size: .85rem; letter-spacing: .05em; padding: .5rem .25rem; border-bottom: 1px solid var(--border); transition: color .15s; }
  .nav-dropdown a:last-child { border-bottom: none; }
  .nav-dropdown a:hover { color: var(--green); }
  .nav-dropdown a.active { color: var(--green); }
  .nav-dropdown .lang-row { display: flex; gap: .75rem; padding: .5rem .25rem; border-bottom: 1px solid var(--border); }
  .nav-dropdown .lang-row a { border: none; padding: 0; font-family: 'Share Tech Mono', monospace; font-size: .8rem; }
  .nav-dropdown .lang-row a.lang-active { color: var(--green); pointer-events: none; }
  @media (max-width: 480px) { .nav-links { display: none; } .nav-lang { display: none; } .nav-burger { display: flex; } }

  .breadcrumb { max-width: 900px; margin: 0 auto; padding: 1rem 1.25rem .25rem; font-family: 'Share Tech Mono', monospace; font-size: .75rem; color: var(--text-dim); letter-spacing: .08em; }
  .breadcrumb a { color: var(--text-dim); text-decoration: none; }
  .breadcrumb a:hover { color: var(--green); }
  .breadcrumb span { color: var(--green); margin: 0 .35em; }

  .section-wrap { max-width: 900px; margin: 0 auto; padding: 0 1.25rem 2.5rem; }

  .page-title { font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 700; color: var(--text); letter-spacing: .04em; text-transform: uppercase; padding: 1.25rem 0 .25rem; }
  .page-meta { font-family: 'Share Tech Mono', monospace; font-size: .78rem; color: var(--amber); letter-spacing: .12em; margin-bottom: 1.75rem; }
  .page-meta::before { content: '// '; color: var(--text-dim); }

  .section-label { font-family: 'Share Tech Mono', monospace; font-size: .82rem; letter-spacing: .2em; color: var(--green); text-transform: uppercase; margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .info-block { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--amber); padding: .85rem 1.1rem; margin-bottom: 1.75rem; font-size: .95rem; color: var(--text); }
  .info-block strong { color: var(--amber); font-family: 'Oswald', sans-serif; font-weight: 600; }

  .steps { display: flex; flex-direction: column; gap: .75rem; margin-bottom: 1rem; }
  .step { display: flex; gap: 1rem; align-items: flex-start; }
  .step-num { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--green); background: var(--surface); border: 1px solid var(--border); width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: .1rem; }
  .step-body strong { color: var(--text); font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: .03em; display: block; margin-bottom: .2rem; }
  .step-body p { font-size: .92rem; color: var(--text-dim); }
  code { font-family: 'Share Tech Mono', monospace; font-size: .88rem; color: var(--code); background: rgba(122,170,46,.08); padding: .05em .3em; border: 1px solid var(--green-dim); border-radius: 2px; }

  .stage-block { margin-bottom: 2rem; }
  .stage-label { font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: .12em; color: var(--green); text-transform: uppercase; margin-bottom: .85rem; display: flex; align-items: center; gap: .6rem; }
  .stage-label::after { content: ''; flex: 1; height: 1px; background: var(--green-dim); }

  .phases { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1rem; }
  .phase-card { background: var(--surface); border: 1px solid var(--border); }
  .phase-header { display: flex; align-items: center; gap: 1rem; padding: .65rem 1rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .phase-num { font-family: 'Oswald', sans-serif; font-size: .9rem; font-weight: 700; letter-spacing: .12em; color: var(--green); }
  .phase-time { font-family: 'Share Tech Mono', monospace; font-size: .8rem; color: var(--amber); margin-left: auto; }
  .phase-body { padding: .65rem 1rem; }
  .phase-body ul { list-style: none; display: flex; flex-direction: column; gap: .3rem; }
  .phase-body ul li { display: flex; align-items: center; font-size: .9rem; gap: .5rem; }
  .phase-body ul li span { font-family: 'Share Tech Mono', monospace; font-size: .82rem; color: var(--text-dim); margin-left: auto; }
  .phase-break { font-family: 'Share Tech Mono', monospace; font-size: .78rem; color: var(--amber); text-align: center; padding: .4rem; letter-spacing: .1em; background: rgba(200,146,10,.05); border: 1px solid rgba(200,146,10,.15); }

  .result-note { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--amber); padding: .65rem 1rem; font-size: .88rem; color: var(--text-dim); margin-top: 1rem; }
  .result-note strong { color: var(--amber); }

  footer { border-top: 1px solid var(--border); padding: 1.25rem; font-family: 'Share Tech Mono', monospace; font-size: .72rem; color: var(--text-dim); text-align: center; letter-spacing: .05em; line-height: 1.8; }
  footer a { color: var(--text-dim); text-decoration: underline; }
  footer a:hover { color: var(--green); }
</style>
</head>
<body>

<div id="site-nav"></div>
<nav class="breadcrumb" id="bc"></nav>

<div class="section-wrap">

  <h1 class="page-title" id="r-title"></h1>
  <p class="page-meta"   id="r-subtitle"></p>

  <p class="section-label">General Information</p>
  <div class="info-block" id="r-info"></div>

  <p class="section-label">Walkthrough</p>
  <div id="r-stages"></div>

</div>

<footer>
  STAY OUT // WIKI // INDEPENDENT FAN ENCYCLOPEDIA ·
  Content licensed under <a href="#">CC BY 4.0</a> ·
  Stay Out and all related materials belong to their respective rights holders. This resource is an unofficial fan site.
</footer>

<script>
(function(){
  const d = DATA;

  document.title = d.title + ' — Stay Out Wiki';

  let bc = '';
  d.breadcrumb.forEach((c,i) => { bc += (i?'<span>›</span>':'') + '<a href="'+c.href+'">'+c.label+'</a>'; });
  bc += '<span>›</span><span style="color:var(--text)">'+d.title+'</span>';
  document.getElementById('bc').innerHTML = bc;

  document.getElementById('r-title').textContent    = d.title;
  document.getElementById('r-subtitle').textContent = d.subtitle;
  document.getElementById('r-info').innerHTML       = d.info;

  let stagesHtml = '';
  d.stages.forEach(stage => {
    stagesHtml += `<div class="stage-block"><div class="stage-label">${stage.label}</div>`;

    if (stage.steps && stage.steps.length) {
      stagesHtml += '<div class="steps">';
      stage.steps.forEach((s,i) => {
        stagesHtml += `<div class="step"><div class="step-num">${i+1}</div><div class="step-body"><strong>${s.title}</strong><p>${s.body}</p></div></div>`;
      });
      stagesHtml += '</div>';
    }

    if (stage.phases && stage.phases.length) {
      stagesHtml += '<div class="phases">';
      stage.phases.forEach((ph, i) => {
        if (i && stage.phaseBreak) {
          stagesHtml += `<div class="phase-break">${stage.phaseBreak}</div>`;
        }
        stagesHtml += `<div class="phase-card">
          <div class="phase-header">
            <span class="phase-num">${ph.label}</span>
            <span style="color:var(--text-dim);font-size:.88rem;">${ph.total}</span>
            <span class="phase-time">${ph.time}</span>
          </div>
          <div class="phase-body">
            <ul>${ph.enemies.map(e=>`<li>${e.name}<span>${e.count}</span></li>`).join('')}</ul>
          </div>
        </div>`;
      });
      stagesHtml += '</div>';
    }

    if (stage.result) {
      stagesHtml += `<div class="result-note">${stage.result}</div>`;
    }

    stagesHtml += '</div>';
  });
  document.getElementById('r-stages').innerHTML = stagesHtml;

  const page = location.pathname.split('/').pop().replace('.html','');
  document.querySelectorAll('.nav-links a, .nav-dropdown a').forEach(a => {
    if (a.dataset.page === page) a.classList.add('active');
  });

  const burger = document.getElementById('navBurger');
  const drop   = document.getElementById('navDropdown');
  if (burger && drop) burger.addEventListener('click', () => drop.classList.toggle('open'));
})();
</script>

</body>
