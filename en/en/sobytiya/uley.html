  /* ── EXPEDITION LORE ──────────────────────────────── */
  lore: [
    {
      date: "19.06.96",
      title: "Log 1",
      text: "Misha Zveroboy finally convinced us to get to Vesuvius. New horizons, he says. We'll earn more, he says. You see, he's tired of slaving away for Gurman. He doesn't pay properly, and the guy's definitely not right in the head if he's ready to cook his grub out of local nasty stuff. And then sell it! Nonsense.<br>Of course, we heard from local lowlifes that things on Vesu aren't that simple, but when the guys and I saw everything with our own eyes, some of us had our hair stand on end.<br>How, just how did this vile, deformed monstrosity, looking like it's not from our world, form right in the middle of a familiar landscape? Stalkers on the radio tower call it a volcano, either jokingly or seriously. I wouldn't say it looks like one, but it's not for me to judge. Nemets, out of old memory, called it fauler Berg. Rotten Mountain, as we later found out. Nervously finishing his cigarette, Sport suggested reaching the 'Aegis' scientists' camp to replenish supplies and ask knowledgeable people about the nature of this behemoth—after all, you don't see something like this every day.<br>We'll head back to the radio tower, get some sleep, and move out."

    },
    {

    },
    {
      date: "22.06.96",

      text: "If some four-eyed slacker ever asks us for anything again, I'm punching him in the face immediately, no questions asked. Even Zveroboy turned his grace into righteous fury. Scientists, damn them. Scientists in name only.<br>I will never believe in my life that they didn't know anything about what's going on here. As we descend into this foul-smelling madness, we occasionally find traces of someone's presence. Quite fresh ones, I must say.<br>In addition to a huge amount of trash, rifts, and blocked corridors, our main nuisance was the huge mushroom growths oozing a smelly sludge.<br>But that's not even the most beautiful part. We found the former employees of the complex. Where did we find them? In the goddamn mushrooms. They literally grew into these goddamn mushrooms. Walking down yet another dark corridor, poor Sport almost lost his mind after someone's pale hand reached out from the wall right onto his shoulder.<br>We'll need to keep an eye on Sport, he took quite a hit. I guess as soon as I finish writing this log, we'll have a drink as a whole group. Nerves are starting to fray."
    },
    {
      date: "23.06.96",
      title: "Log 5",
      text: "I'm writing this with trembling hands under the dim light of a lamp in a ruined tunnel. Sport and Nemets are missing. And along with them, most of our medicines and supplies.<br>Zveroboy went back along our route but found no trace of the guys. There was only one thing left for the three of us to do—find them and return to the surface. Screw the scientists, screw all these documents. The main task now is to get back to the camp alive.<br>As we descend, the walls start to close in even harder. While yesterday only Sport heard the mournful chanting, today I started catching myself doing it too. The sound is becoming more tangible and louder, the walls seem to vibrate in time with this dreary humming.<br>We found a strange corpse. Not a single mushroom around it. Nearby lay a device that looked like a sprayer of a bizarre shape, like a wasp sting, and several vials of some incomprehensible, smelly sludge. Rifma suggested that the scientists were trying to neutralize the spores with these sprayers. We took the device with us.<br>After that, hell broke loose. Sport and Nemets weren't in the huge hall, but we found the chaotically scattered packages of our medicines. Then—silence. The chanting stopped. With the back of our necks, we felt that there was someone else in the hall.<br>The beast burst out of a growth and lunged at Zveroboy. It looked somewhat like a human, but a shriveled mummy made of mushrooms. Blow after blow. I froze. Thanks to Rifma—in all the chaos, he put a bullet right into the creature's rotten head.<br>Zveroboy was already showing no signs of life. Rest in peace, Misha.<br>Right after, frantic screams pierced the entire complex. Rifma grabbed me and dragged me into the nearest passage, even deeper into the catacombs. We reached a tunnel and closed the airtight door behind us. At least that will hold them off for a while."
    },

      date: "",
      title: "Log 6",
      text: "I couldn't help him. I just... couldn't.<br>He saved my life, and I couldn't save his. The remnants of concrete treacherously gave way under Rifma while he was trying to cross this chasm.<br>I lost them all, and I'm left alone.<br>I no longer hope that Sport or Nemets are alive after what I've seen here. All that's left for me is to just move forward and try to sell my life as dearly as possible, taking at least a few of the creatures with me.<br>I can hear them breaking down the door at the beginning of the tunnel. They'll be here soon."
    },
    {
      date: "",
      title: "Log 7",
      text: "i found sport. or rather, what he became.<br>wandering through the black corridors, I met him in one of the rooms. he... he was speaking. not to me—no. he was talking to an overgrown wall, talking to it as if it were his old friend. for a second, I was even glad to hear his voice.<br>the mushroom sludge squelched treacherously under my boots. sport... turned around. not the sport we used to sit and have fun with in the lyubech bar. and definitely not the one who saved us from anomalies more than once.<br>there was darkness in his eyes. there was madness in his eyes.<br>and a knife in his hand. just like the one the creature that killed misha had.<br>he rushed at me. with the same insane scream. my rifle was left behind in one of the endless corridors. I didn't notice how the knife slipped between the folds of my body armor and hit my stomach. with the last of my strength, I threw him off and stumbled out of the room.<br>I ran. I ran along the remains of dim lamps on the ceiling until I reached some cave. it's clearly artificial. sport chased me, but at the entrance to the cave, he stopped dead in his tracks. and just stared. with his empty gaze.<br>and now I'm just lying here under the light coming from the mushrooms, writing these words down. I don't even know why.<br>if anyone finds these logs—I beg you—run. tell everyone in the zone that this place... is cursed. it brings nothing but evil and suffering.<br>remember us."
    },

    }

  .phase-break { font-family: 'Share Tech Mono', monospace; font-size: .78rem; color: var(--text-dim); text-align: center; padding: .3rem; letter-spacing: .12em; }

  /* RESULT NOTE */
  .result-note { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--amber); padding: .65rem 1rem; font-size: .88rem; color: var(--text-dim); margin-top: 1rem; }
  .result-note strong { color: var(--amber); }

  /* QUOTE BLOCK */
  .quote-block { border-left: 3px solid var(--green-dim); background: var(--surface); padding: 1rem 1.25rem; margin-bottom: .1rem; font-size: .9rem; color: var(--text-dim); font-style: italic; line-height: 1.7; }
  .quote-block strong { color: var(--text); font-style: normal; }

  /* LORE */
  .lore-entry { margin-bottom: 1.5rem; }
  .lore-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: .5rem; }
  .lore-title { font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; color: var(--text); letter-spacing: .04em; }
  .lore-date { font-family: 'Share Tech Mono', monospace; font-size: .75rem; color: var(--text-dim); letter-spacing: .08em; }
  .lore-epilogue .lore-title { color: var(--amber); }
  .lore-epilogue .quote-block { border-color: var(--amber); }

  /* FOOTER */
  footer { border-top: 1px solid var(--border); padding: 1.25rem; font-family: 'Share Tech Mono', monospace; font-size: .72rem; color: var(--text-dim); text-align: center; letter-spacing: .05em; line-height: 1.8; }
  footer a { color: var(--text-dim); text-decoration: underline; }
  footer a:hover { color: var(--green); }
</style>
</head>
<body>

<div id="site-nav"></div>
<nav class="breadcrumb" id="bc"></nav>

<div class="section-wrap">

  <h1 class="page-title" id="r-title"></h1>
  <p class="page-meta"   id="r-subtitle"></p>

  <p class="section-label">General Information</p>
  <div class="info-block" id="r-info"></div>

  <p class="section-label">Walkthrough</p>
  <div id="r-stages"></div>

  <p class="section-label">History of the First Expedition</p>
  <div id="r-lore"></div>

</div>

<footer>
  STAY OUT // WIKI // INDEPENDENT FAN ENCYCLOPEDIA ·
  Content licensed under <a href="#">CC BY 4.0</a> ·
  Stay Out and all related materials belong to their respective owners. This resource is an unofficial fan site.
</footer>

<script>
(function(){
  const d = DATA;

  document.title = d.title + ' — Stay Out Wiki';

  // breadcrumb
  let bc = '';
  d.breadcrumb.forEach((c,i) => { bc += (i?'<span>›</span>':'') + '<a href="'+c.href+'">'+c.label+'</a>'; });
  bc += '<span>›</span><span style="color:var(--text)">'+d.title+'</span>';
  document.getElementById('bc').innerHTML = bc;

  // заголовок
  document.getElementById('r-title').textContent    = d.title;
  document.getElementById('r-subtitle').textContent = d.subtitle;
  document.getElementById('r-info').innerHTML       = d.info;

  // этапы
  let stagesHtml = '';
  d.stages.forEach(stage => {
    stagesHtml += `<div class="stage-block"><div class="stage-label">${stage.label}</div>`;

    if (stage.steps) {
      stagesHtml += '<div class="steps">';
      stage.steps.forEach((s,i) => {
        stagesHtml += `<div class="step"><div class="step-num">${i+1}</div><div class="step-body"><strong>${s.title}</strong><p>${s.body}</p></div></div>`;
      });
      stagesHtml += '</div>';
    }

    if (stage.eventTitle) {
      stagesHtml += `<div class="event-note"><strong>${stage.eventTitle}</strong><br>${stage.eventDesc}</div>`;
    }

    if (stage.phases) {
      stagesHtml += '<div class="phases">';
      stage.phases.forEach((ph,i) => {
        if (i && stage.phaseBreak) stagesHtml += `<div class="phase-break">${stage.phaseBreak}</div>`;
        stagesHtml += `<div class="phase-card">
          <div class="phase-header">
            <span class="phase-num">${ph.label}</span>
            <span style="color:var(--text-dim);font-size:.88rem;">${ph.total}</span>
            <span class="phase-time">${ph.time}</span>
          </div>
          <div class="phase-body">
            <ul>${ph.enemies.map(e=>`<li>${e.name}<span>${e.count}</span></li>`).join('')}</ul>
          </div>
        </div>`;
      });
      stagesHtml += '</div>';
    }

    if (stage.result) {
      stagesHtml += `<div class="result-note">${stage.result}</div>`;
    }

    stagesHtml += '</div>';
  });
  document.getElementById('r-stages').innerHTML = stagesHtml;

  // история
  let loreHtml = '';
  d.lore.forEach(entry => {
    const cls = entry.epilogue ? 'lore-entry lore-epilogue' : 'lore-entry';
    loreHtml += `<div class="${cls}">
      <div class="lore-header">
        <span class="lore-title">${entry.title}</span>
        ${entry.date ? `<span class="lore-date">${entry.date}</span>` : ''}
      </div>
      <div class="quote-block">${entry.text}</div>
    </div>`;
  });
  document.getElementById('r-lore').innerHTML = loreHtml;

  // активный пункт навбара
  const page = location.pathname.split('/').pop().replace('.html','');
  document.querySelectorAll('.nav-links a, .nav-dropdown a').forEach(a => {
    if (a.dataset.page === page) a.classList.add('active');
  });

  // бургер
  const burger = document.getElementById('navBurger');
  const drop   = document.getElementById('navDropdown');
  if (burger && drop) burger.addEventListener('click', () => drop.classList.toggle('open'));
})();
</script>

</body>
</html>
